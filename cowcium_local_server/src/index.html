<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cowcium — Titration Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Serif+Display&display=swap" rel="stylesheet">
<style>
  :root {
    --dark:   #1b3728;
    --dark2:  #243f32;
    --dark3:  #2e5240;
    --light:  #c8df8c;
    --light2: #dff0b0;
    --light3: #eef7d6;
    --white:  #f8fdf0;
    --border: rgba(200,223,140,0.18);
    --text:   #f0f8e8;
    --muted:  rgba(200,223,140,0.5);
    --r:0; --g:0; --b:0;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--dark);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding: 1.5rem;
    gap: 1.25rem;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  /* SVG logo inline — teardrop with cow */
  .logo-icon {
    width: 42px;
    height: 42px;
    flex-shrink: 0;
  }

  .brand-name {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    color: var(--light);
    letter-spacing: 0.01em;
  }

  .brand-sub {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: -2px;
  }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 0.35rem 0.85rem;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.live  { background: var(--light); box-shadow: 0 0 6px var(--light); animation: blink 2s infinite; }
  .status-dot.error { background: #e06060; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* ── COLOR PREVIEW ── */
  .color-preview {
    width: 100%;
    height: 200px;
    border-radius: 8px;
    background: rgb(var(--r),var(--g),var(--b));
    border: 1px solid var(--border);
    transition: background 0.7s ease;
    position: relative;
    overflow: hidden;
  }

  .color-preview::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 55%);
  }

  .hex-badge {
    position: absolute;
    bottom: 1rem;
    right: 1rem;
    background: rgba(27,55,40,0.72);
    backdrop-filter: blur(6px);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    font-family: 'DM Serif Display', serif;
    font-size: 1.15rem;
    color: var(--light);
    letter-spacing: 0.04em;
  }

  .preview-label {
    position: absolute;
    top: 1rem;
    left: 1rem;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
  }

  /* ── CHANNELS ── */
  .channels {
    display: grid;
    grid-template-columns: repeat(4,1fr);
    gap: 0.75rem;
  }

  .channel {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.9rem 1rem;
    display: flex;
    flex-direction: column;
    gap: 0.45rem;
  }

  .channel-label {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .channel-value {
    font-family: 'DM Serif Display', serif;
    font-size: 1.9rem;
    line-height: 1;
    color: var(--light);
  }

  .channel-bar { height: 3px; background: rgba(200,223,140,0.12); border-radius: 2px; overflow:hidden; }
  .channel-bar-fill { height:100%; border-radius:2px; transition:width 0.6s ease; background: var(--light); }
  .ch-r .channel-bar-fill { background: #e8806a; }
  .ch-r .channel-value    { color: #e8a090; }
  .ch-g .channel-bar-fill { background: var(--light); }
  .ch-g .channel-value    { color: var(--light2); }
  .ch-b .channel-bar-fill { background: #7ab8e0; }
  .ch-b .channel-value    { color: #9acff0; }
  .ch-c .channel-bar-fill { background: rgba(200,223,140,0.6); }
  .ch-c .channel-value    { color: var(--muted); }

  /* ── RECORD BUTTON ── */
  .record-btn {
    width: 100%;
    padding: 1rem 2rem;
    background: var(--light);
    color: var(--dark);
    border: none;
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
  }

  .record-btn:hover  { background: var(--light2); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(200,223,140,0.2); }
  .record-btn:active { transform: translateY(0); }
  .record-btn.recording { background: #e06060; color: #fff; animation: recpulse 0.7s infinite; }
  @keyframes recpulse { 0%,100%{box-shadow:0 0 0 0 rgba(224,96,96,0.4)} 50%{box-shadow:0 0 0 8px rgba(224,96,96,0)} }

  /* ── LOG TABLE ── */
  .log-section { display:flex; flex-direction:column; gap:0.65rem; }

  .section-header { display:flex; justify-content:space-between; align-items:center; }

  .section-title {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 0.28rem 0.65rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .clear-btn:hover { border-color: var(--light); color: var(--light); }

  .log-table {
    background: var(--dark2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .log-head {
    display: grid;
    grid-template-columns: 1.5fr 0.7fr 0.7fr 0.7fr 0.7fr 1.1fr;
    padding: 0.55rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.58rem;
    letter-spacing: 0.13em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .log-body { max-height: 220px; overflow-y: auto; }
  .log-body::-webkit-scrollbar { width: 3px; }
  .log-body::-webkit-scrollbar-thumb { background: var(--border); }

  .log-row {
    display: grid;
    grid-template-columns: 1.5fr 0.7fr 0.7fr 0.7fr 0.7fr 1.1fr;
    padding: 0.5rem 1rem;
    border-bottom: 1px solid var(--border);
    font-size: 0.72rem;
    align-items: center;
    animation: rowIn 0.3s ease;
    color: var(--light3);
  }
  .log-row:last-child { border-bottom: none; }
  .log-row:hover { background: rgba(200,223,140,0.04); }
  @keyframes rowIn { from{opacity:0;transform:translateY(-3px)} to{opacity:1;transform:translateY(0)} }

  .swatch { width:13px; height:13px; border-radius:3px; display:inline-block; margin-right:6px; vertical-align:middle; border:1px solid rgba(255,255,255,0.12); }

  .empty-state { padding:2.5rem 1rem; text-align:center; color:var(--muted); font-size:0.72rem; letter-spacing:0.07em; }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(70px);
    background: var(--light);
    color: var(--dark);
    padding: 0.55rem 1.3rem;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-weight: 700;
    font-size: 0.78rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
    pointer-events: none;
    z-index: 100;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="brand">
    <!-- Teardrop + cow logo, recreated as inline SVG matching the brand image -->
    <svg class="logo-icon" viewBox="0 0 100 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- teardrop shape -->
      <path d="M50 5 C50 5 10 50 10 75 C10 97 28 115 50 115 C72 115 90 97 90 75 C90 50 50 5 50 5Z"
            fill="#2e5240" stroke="#c8df8c" stroke-width="3"/>
      <!-- simplified cow head -->
      <ellipse cx="50" cy="72" rx="22" ry="20" fill="#f0f8e8"/>
      <!-- ears -->
      <ellipse cx="28" cy="64" rx="7" ry="5" fill="#f0f8e8" transform="rotate(-20,28,64)"/>
      <ellipse cx="72" cy="64" rx="7" ry="5" fill="#f0f8e8" transform="rotate(20,72,64)"/>
      <!-- eyes -->
      <circle cx="43" cy="68" r="2.5" fill="#1b3728"/>
      <circle cx="57" cy="68" r="2.5" fill="#1b3728"/>
      <!-- nostrils -->
      <ellipse cx="46" cy="78" rx="2.5" ry="1.8" fill="#c8b8a0"/>
      <ellipse cx="54" cy="78" rx="2.5" ry="1.8" fill="#c8b8a0"/>
      <!-- horns -->
      <path d="M32 55 Q25 44 30 38" stroke="#f0f8e8" stroke-width="3" stroke-linecap="round" fill="none"/>
      <path d="M68 55 Q75 44 70 38" stroke="#f0f8e8" stroke-width="3" stroke-linecap="round" fill="none"/>
    </svg>
    <div>
      <div class="brand-name">Cowcium</div>
      <div class="brand-sub">Titration Monitor</div>
    </div>
  </div>
  <div class="status-pill">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusLabel">Connecting</span>
  </div>
</header>

<div class="color-preview">
  <div class="preview-label">Live Color</div>
  <div class="hex-badge" id="hexOverlay">#000000</div>
</div>

<div class="channels">
  <div class="channel ch-r">
    <div class="channel-label">Red</div>
    <div class="channel-value" id="valR">—</div>
    <div class="channel-bar"><div class="channel-bar-fill" id="barR" style="width:0%"></div></div>
  </div>
  <div class="channel ch-g">
    <div class="channel-label">Green</div>
    <div class="channel-value" id="valG">—</div>
    <div class="channel-bar"><div class="channel-bar-fill" id="barG" style="width:0%"></div></div>
  </div>
  <div class="channel ch-b">
    <div class="channel-label">Blue</div>
    <div class="channel-value" id="valB">—</div>
    <div class="channel-bar"><div class="channel-bar-fill" id="barB" style="width:0%"></div></div>
  </div>
  <div class="channel ch-c">
    <div class="channel-label">Clear</div>
    <div class="channel-value" id="valC">—</div>
    <div class="channel-bar"><div class="channel-bar-fill" id="barC" style="width:0%"></div></div>
  </div>
</div>

<button class="record-btn" id="recordBtn" onclick="recordReading()">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
    <circle cx="7" cy="7" r="5"/>
  </svg>
  Record Titration Point
</button>

<div class="log-section">
  <div class="section-header">
    <div class="section-title">Recorded Readings</div>
    <button class="clear-btn" onclick="clearLog()">Clear all</button>
  </div>
  <div class="log-table">
    <div class="log-head">
      <span>Timestamp</span><span>R</span><span>G</span><span>B</span><span>C</span><span>Color</span>
    </div>
    <div class="log-body" id="logBody">
      <div class="empty-state" id="emptyState">No readings recorded yet.</div>
    </div>
  </div>
</div>

<div class="toast" id="toast">Recorded!</div>

<script>
  const POLL_MS = 500;
  let current = { red:0, green:0, blue:0, clear:0 };
  let recordings = JSON.parse(localStorage.getItem('titrationLog') || '[]');

  function toHex(v) { return Math.min(255,Math.round(v)).toString(16).padStart(2,'0').toUpperCase(); }

  function updateUI(data) {
    current = data;
    const scale = data.clear > 0 ? 255 / data.clear : 1;
    const dr = Math.min(255, Math.round(data.red   * scale));
    const dg = Math.min(255, Math.round(data.green * scale));
    const db = Math.min(255, Math.round(data.blue  * scale));

    document.documentElement.style.setProperty('--r', dr);
    document.documentElement.style.setProperty('--g', dg);
    document.documentElement.style.setProperty('--b', db);
    document.getElementById('hexOverlay').textContent = `#${toHex(dr)}${toHex(dg)}${toHex(db)}`;

    document.getElementById('valR').textContent = data.red;
    document.getElementById('valG').textContent = data.green;
    document.getElementById('valB').textContent = data.blue;
    document.getElementById('valC').textContent = data.clear;

    const max = Math.max(data.clear, 1);
    document.getElementById('barR').style.width = (data.red   / max * 100) + '%';
    document.getElementById('barG').style.width = (data.green / max * 100) + '%';
    document.getElementById('barB').style.width = (data.blue  / max * 100) + '%';
    document.getElementById('barC').style.width = '100%';
  }

  async function poll() {
    try {
      const res = await fetch('/poll', { signal: AbortSignal.timeout(1000) });
      if (!res.ok) throw new Error();
      updateUI(await res.json());
      setStatus('live', 'Live');
    } catch { setStatus('error', 'No signal'); }
  }

  function setStatus(cls, label) {
    document.getElementById('statusDot').className = 'status-dot ' + cls;
    document.getElementById('statusLabel').textContent = label;
  }

  function recordReading() {
    if (!current.clear && !current.red) { showToast('No data yet!'); return; }
    const btn = document.getElementById('recordBtn');
    btn.classList.add('recording');
    setTimeout(() => btn.classList.remove('recording'), 700);

    const entry = { ts: new Date().toLocaleTimeString(), ...current };
    recordings.unshift(entry);
    localStorage.setItem('titrationLog', JSON.stringify(recordings));
    renderLog();
    showToast('Recorded!');
    fetch('/record', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(entry) }).catch(()=>{});
  }

  function renderLog() {
    const body = document.getElementById('logBody');
    document.getElementById('emptyState').style.display = recordings.length ? 'none' : 'block';
    body.querySelectorAll('.log-row').forEach(r => r.remove());
    recordings.forEach(e => {
      const scale = e.clear > 0 ? 255 / e.clear : 1;
      const hex = `#${toHex(e.red*scale)}${toHex(e.green*scale)}${toHex(e.blue*scale)}`;
      const row = document.createElement('div');
      row.className = 'log-row';
      row.innerHTML = `<span>${e.ts}</span><span>${e.red}</span><span>${e.green}</span><span>${e.blue}</span><span>${e.clear}</span><span><span class="swatch" style="background:${hex}"></span>${hex}</span>`;
      body.appendChild(row);
    });
  }

  let toastTimer;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 1800);
  }

  renderLog();
  poll();
  setInterval(poll, POLL_MS);
</script>
</body>
</html>
